<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarso Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── Quiz Container ── */
    .quiz-container {
      position: relative;
      background: white;
      width: 100%;
      max-width: 700px;
      border-radius: 24px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2), 0 8px 24px rgba(102,126,234,0.15);
      overflow: hidden;
      transition: background-color 0.35s ease;
    }

    .quiz-container.flash-correct { background-color: #e8f8ee; }
    .quiz-container.flash-wrong   { background-color: #fdeaea; }

    /* ── Progress bar ── */
    .progress-track {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: #e8ecf4;
      border-radius: 24px 24px 0 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 0 3px 3px 0;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── START SCREEN ── */
    #start-screen {
      text-align: center;
      animation: fadeInUp 0.6s cubic-bezier(0.34,1.26,0.64,1) both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .start-icon {
      font-size: 4rem;
      margin-bottom: 12px;
      display: block;
      animation: bounceSlow 2.5s ease-in-out infinite;
    }

    @keyframes bounceSlow {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .start-title {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      margin-bottom: 12px;
    }

    .start-subtitle {
      font-size: 1.05rem;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .start-info-grid {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .info-card {
      background: #f0f4ff;
      border-radius: 14px;
      padding: 16px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 110px;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
    }

    .info-card:hover {
      border-color: #c4b5fd;
      transform: translateY(-3px);
    }

    .info-card .ic-icon { font-size: 1.8rem; }
    .info-card .ic-value {
      font-size: 1.15rem;
      font-weight: 800;
      color: #4338ca;
    }
    .info-card .ic-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .start-btn {
      display: inline-block;
      padding: 16px 52px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1.1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 6px 20px rgba(102,126,234,0.45);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      letter-spacing: 0.02em;
    }

    .start-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 12px 28px rgba(102,126,234,0.55);
    }

    .start-btn:active { transform: scale(0.98); }

    /* ── QUIZ SCREEN ── */
    #quiz-screen { animation: fadeInUp 0.5s cubic-bezier(0.34,1.26,0.64,1) both; }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .top-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-weight: 700;
      color: #4a5568;
      gap: 12px;
      flex-wrap: wrap;
    }

    .timer-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timer-svg {
      width: 52px;
      height: 52px;
      transform: rotate(-90deg);
    }

    .timer-bg {
      fill: none;
      stroke: #e8ecf4;
      stroke-width: 4;
    }

    .timer-progress {
      fill: none;
      stroke: url(#timerGradient);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 113.1;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 0.3s linear;
    }

    #score {
      display: inline-block;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    #score.score-pop { transform: scale(1.3); }

    .question {
      font-size: 1.35rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #2d3748;
      line-height: 1.5;
    }

    #question-image {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .answers { display: grid; gap: 12px; }

    .answers button {
      padding: 16px 18px;
      border: 2px solid transparent;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      text-align: left;
      background: #f0f4ff;
      color: #2d3748;
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.25s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 4px rgba(102,126,234,0.06);
    }

    .answers button:hover:not(:disabled) {
      border-color: #4f7cff;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(79,124,255,0.2);
    }

    .answers button:disabled { cursor: default; }
    .answers button.correct  { background: #d4edda; border-color: #28a745; color: #155724; }
    .answers button.wrong    { background: #f8d7da; border-color: #dc3545; color: #721c24; }

    /* ── RESULT SCREEN ── */
    .result { text-align: center; display: none; }

    .result h2 {
      margin-bottom: 16px;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .stars {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 20px 0;
      font-size: 2.5rem;
    }

    .stars .star {
      opacity: 0;
      transform: scale(0) rotate(-20deg);
      animation: starEnter 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes starEnter {
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    #final-score {
      font-size: 1.2rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 8px;
    }

    .restart {
      margin-top: 24px;
      padding: 14px 32px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 14px rgba(102,126,234,0.4);
    }

    .restart:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102,126,234,0.5);
    }

    /* ── FLOATING EMOJIS ── */
    .float-emoji {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      line-height: 1;
      will-change: transform, opacity;
    }

    .float-emoji.correct-anim {
      animation: floatUpCorrect var(--duration,1.2s) ease-out forwards;
    }

    .float-emoji.wrong-anim {
      animation: floatUpWrong var(--duration,1.4s) ease-out forwards;
    }

    @keyframes floatUpCorrect {
      0%   { opacity: 0; transform: translate(0,0) scale(0.5); }
      15%  { opacity: 1; transform: translate(var(--drift-x,0),-20px) scale(1); }
      100% { opacity: 0; transform: translate(var(--drift-x,0),-120px) scale(0.8); }
    }

    @keyframes floatUpWrong {
      0%   { opacity: 0; transform: translate(0,0) scale(0.5); }
      8%   { opacity: 1; transform: translate(2px,0) scale(1); }
      16%  { transform: translate(-3px,-2px) scale(1); }
      24%  { transform: translate(3px,1px) scale(1); }
      32%  { transform: translate(-2px,-1px) scale(1); }
      40%  { transform: translate(2px,0) scale(1); }
      48%  { opacity: 1; transform: translate(0,-8px) scale(1); }
      100% { opacity: 0; transform: translate(var(--drift-x,0),-110px) scale(0.75); }
    }
  </style>
</head>
<body>

  <div class="quiz-container" id="quiz-container">
    <div class="progress-track" aria-hidden="true">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- ══ START SCREEN ══ -->
    <div id="start-screen">
      <span class="start-icon">🧠</span>
      <h2 class="start-title">Tarso Quiz</h2>
      <p class="start-subtitle">Teste seus conhecimentos sobre<br>valores e atitudes do dia a dia!</p>

      <div class="start-info-grid">
        <div class="info-card">
          <span class="ic-icon">❓</span>
          <span class="ic-value">5</span>
          <span class="ic-label">Perguntas</span>
        </div>
        <div class="info-card">
          <span class="ic-icon">⏱️</span>
          <span class="ic-value">15s</span>
          <span class="ic-label">Por questão</span>
        </div>
        <div class="info-card">
          <span class="ic-icon">🏆</span>
          <span class="ic-value">500</span>
          <span class="ic-label">Pontos máx.</span>
        </div>
      </div>

      <button class="start-btn" type="button" onclick="startQuiz()">
        Começar Quiz ✨
      </button>
    </div>

    <!-- ══ QUIZ SCREEN ══ -->
    <div id="quiz-screen" style="display:none;">
      <h1>Tarso Quiz</h1>

      <div class="top-info">
        <span id="question-number">Pergunta 1</span>
        <div class="timer-wrap" aria-label="Tempo restante">
          <svg class="timer-svg" viewBox="0 0 44 44">
            <defs>
              <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stop-color="#667eea" />
                <stop offset="100%" stop-color="#764ba2" />
              </linearGradient>
            </defs>
            <circle class="timer-bg"       cx="22" cy="22" r="18" />
            <circle class="timer-progress" id="timer-circle" cx="22" cy="22" r="18" />
          </svg>
        </div>
        <span id="score">Pontos: 0</span>
      </div>

      <div class="question" id="question"></div>
      <img id="question-image" src="" alt="Imagem da pergunta" />
      <div class="answers" id="answers"></div>
    </div>

    <!-- ══ RESULT SCREEN ══ -->
    <div class="result" id="result-screen">
      <h2>Quiz Finalizado!</h2>
      <div class="stars" id="stars" aria-label="Avaliação por estrelas"></div>
      <p id="final-score"></p>
      <button class="restart" type="button" onclick="restartQuiz()">
        Jogar Novamente
      </button>
    </div>
  </div>

  <script>
    const questions = [
      {
        question: 'Uma pessoa ajuda um idoso a atravessar a rua. Qual valor está sendo demonstrado?',
        image: 'https://img.freepik.com/fotos-premium/mulher-idosa-com-mascara-medica-usando-uma-bengala-enquanto-atravessa-a-rua-com-uma-jovem-voluntaria-carregando-sua-sacola-de-compras_317809-2476.jpg?semt=ais_hybrid&w=740&q=80',
        answers: ['Preguiça', 'Respeito', 'Egoísmo', 'Impaciência'],
        correct: 1
      },
      {
        question: 'Alguém chega no horário combinado para um compromisso. Que valor está demonstrando?',
        image: 'https://img.freepik.com/fotos-premium/que-horas-sao-confiante-ocupado-bonito-olhando-para-o-relogio-e-verificando-as-horas-enquanto-tem-um-compromisso_259150-22453.jpg',
        answers: ['Atraso', 'Pontualidade', 'Descompromisso', 'Negligência'],
        correct: 1
      },
      {
        question: 'Um estudante encontra uma carteira no chão e devolve ao dono. Que valor ele demonstra?',
        image: 'https://cdn6.campograndenews.com.br/uploads/noticias/2020/04/30/1hb0jf0x4ktbv.jpg',
        answers: ['Ganância', 'Desonestidade', 'Inveja', 'Honestidade'],
        correct: 3
      },
      {
        question: 'Alguém compartilha seu lanche com um colega que esqueceu o dele. Qual valor está presente?',
        image: 'https://colegiocbv.com.br/wp-content/uploads/blog/2016/11/Colegio-Boa-Viagem-Lanche-coletivo-momento-de-interacao-descoberta-e-ampliacao-do-cardapio.png',
        answers: ['Egoísmo', 'Raiva', 'Solidariedade', 'Orgulho'],
        correct: 2
      },
      {
        question: 'Uma pessoa cuida do meio ambiente, jogando lixo na lixeira. Que valor demonstra?',
        image: 'https://extra.globo.com/incoming/20358309-815-ce9/w976h550-PROP/2014-743447121-2014-743250578-2014081801498_20140818_20140819.jpg',
        answers: ['Responsabilidade', 'Descuidado', 'Preguiça', 'Desdem'],
        correct: 0
      }
    ];

    const TIMER_SECONDS      = 15;
    const TIMER_CIRCUMFERENCE = 2 * Math.PI * 18;
    const CORRECT_EMOJIS     = ['✅','🎉','⭐','🏆','🎊'];
    const WRONG_EMOJIS       = ['❌','😬','💔','😅','🙈'];

    let currentQuestion = 0;
    let score           = 0;
    let answeredCount   = 0;
    let timeLeft        = TIMER_SECONDS;
    let timer;

    const quizContainer       = document.getElementById('quiz-container');
    const questionElement     = document.getElementById('question');
    const imageElement        = document.getElementById('question-image');
    const answersElement      = document.getElementById('answers');
    const scoreElement        = document.getElementById('score');
    const timerCircle         = document.getElementById('timer-circle');
    const questionNumberElement = document.getElementById('question-number');
    const progressFill        = document.getElementById('progress-fill');

    timerCircle.style.strokeDasharray = TIMER_CIRCUMFERENCE;

    function updateProgressBar() {
      progressFill.style.width = ((answeredCount / questions.length) * 100) + '%';
    }

    function updateTimerRing() {
      const offset = TIMER_CIRCUMFERENCE * (1 - timeLeft / TIMER_SECONDS);
      timerCircle.style.strokeDashoffset = offset;
    }

    function flashContainer(type) {
      const cls = type === 'correct' ? 'flash-correct' : 'flash-wrong';
      quizContainer.classList.add(cls);
      setTimeout(() => quizContainer.classList.remove(cls), 400);
    }

    function popScore() {
      scoreElement.classList.remove('score-pop');
      void scoreElement.offsetWidth;
      scoreElement.classList.add('score-pop');
      setTimeout(() => scoreElement.classList.remove('score-pop'), 400);
    }

    function spawnFloatingEmojis(button, isCorrect) {
      const pool = isCorrect ? CORRECT_EMOJIS : WRONG_EMOJIS;
      const count = 5 + Math.floor(Math.random() * 4);
      const rect = button.getBoundingClientRect();
      const originX = rect.left + rect.width / 2;
      const originY = rect.top + rect.height / 2;

      for (let i = 0; i < count; i++) {
        const span = document.createElement('span');
        span.className = 'float-emoji ' + (isCorrect ? 'correct-anim' : 'wrong-anim');
        span.textContent = pool[Math.floor(Math.random() * pool.length)];

        const sizeRem   = 1.5 + Math.random() * 1.5;
        const durationMs = 1100 + Math.random() * 500;
        const driftX    = (Math.random() - 0.5) * 80;

        span.style.fontSize = sizeRem + 'rem';
        span.style.left = (originX + (Math.random() - 0.5) * 60) + 'px';
        span.style.top  = originY + 'px';
        span.style.setProperty('--duration', durationMs + 'ms');
        span.style.setProperty('--drift-x',  driftX + 'px');

        document.body.appendChild(span);
        setTimeout(() => span.remove(), durationMs + 50);
      }
    }

    function startQuiz() {
      document.getElementById('start-screen').style.display = 'none';
      const quizScreen = document.getElementById('quiz-screen');
      quizScreen.style.display = 'block';
      quizScreen.style.animation = 'fadeInUp 0.5s cubic-bezier(0.34,1.26,0.64,1) both';
      loadQuestion();
    }

    function loadQuestion() {
      clearInterval(timer);
      timeLeft = TIMER_SECONDS;
      updateTimerRing();
      startTimer();

      const q = questions[currentQuestion];
      questionNumberElement.textContent = 'Pergunta ' + (currentQuestion + 1);
      questionElement.textContent = q.question;

      if (q.image) {
        imageElement.src = q.image;
        imageElement.style.display = 'block';
      } else {
        imageElement.style.display = 'none';
      }

      answersElement.innerHTML = '';
      q.answers.forEach((answer, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = answer;
        button.onclick = () => checkAnswer(index, button);
        answersElement.appendChild(button);
      });
    }

    function checkAnswer(selected, button) {
      clearInterval(timer);
      const correct   = questions[currentQuestion].correct;
      const isCorrect = selected === correct;
      const buttons   = answersElement.querySelectorAll('button');

      buttons.forEach((btn, index) => {
        btn.disabled = true;
        if (index === correct) btn.classList.add('correct');
      });

      if (isCorrect) {
        score += 100;
        scoreElement.textContent = 'Pontos: ' + score;
        popScore();
        flashContainer('correct');
      } else {
        button.classList.add('wrong');
        flashContainer('wrong');
      }

      spawnFloatingEmojis(button, isCorrect);
      answeredCount++;
      updateProgressBar();

      setTimeout(() => {
        currentQuestion++;
        currentQuestion < questions.length ? loadQuestion() : finishQuiz();
      }, 1500);
    }

    function startTimer() {
      updateTimerRing();
      timer = setInterval(() => {
        timeLeft--;
        updateTimerRing();
        if (timeLeft <= 0) {
          clearInterval(timer);
          answeredCount++;
          updateProgressBar();
          currentQuestion++;
          currentQuestion < questions.length ? loadQuestion() : finishQuiz();
        }
      }, 1000);
    }

    function getStarCount() {
      const pct = (score / 100 / questions.length) * 100;
      if (pct >= 90) return 5;
      if (pct >= 70) return 4;
      if (pct >= 50) return 3;
      if (pct >= 30) return 2;
      return 1;
    }

    function renderStars(count) {
      const starsEl = document.getElementById('stars');
      starsEl.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const star = document.createElement('span');
        star.className = 'star';
        star.textContent = i < count ? '⭐' : '☆';
        star.style.animationDelay = i * 0.15 + 's';
        starsEl.appendChild(star);
      }
    }

    function finishQuiz() {
      clearInterval(timer);
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('result-screen').style.display = 'block';
      document.getElementById('final-score').textContent = 'Você fez ' + score + ' pontos!';
      renderStars(getStarCount());
    }

    function restartQuiz() {
      currentQuestion = 0;
      score           = 0;
      answeredCount   = 0;
      scoreElement.textContent = 'Pontos: 0';
      updateProgressBar();

      document.getElementById('result-screen').style.display  = 'none';
      document.getElementById('quiz-screen').style.display    = 'none';
      document.getElementById('stars').innerHTML = '';

      const startScreen = document.getElementById('start-screen');
      startScreen.style.display = 'block';
      startScreen.style.animation = 'none';
      void startScreen.offsetWidth;
      startScreen.style.animation = 'fadeInUp 0.5s cubic-bezier(0.34,1.26,0.64,1) both';
    }

    updateProgressBar();
  </script>

</body>
</html>
